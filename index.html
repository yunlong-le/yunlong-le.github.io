<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Termi — Yunlong Le</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0c0c0c;
    color: #cccccc;
    font-family: 'Cascadia Code', 'Cascadia Mono', 'Consolas', 'Courier New', monospace;
    font-size: 14px;
    line-height: 1.5;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* 主终端区域 — 整体可滚动 */
  #terminal {
    flex: 1;
    overflow-y: auto;
    padding: 8px 12px;
  }

  /* 自定义滚动条 */
  #terminal::-webkit-scrollbar { width: 6px; }
  #terminal::-webkit-scrollbar-track { background: #0c0c0c; }
  #terminal::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
  #terminal::-webkit-scrollbar-thumb:hover { background: #666; }

  /* 输出区域 */
  #output {
    white-space: pre-wrap;
    word-break: break-all;
  }

  /* 欢迎卡片 — CSS 实线边框 */
  .welcome-box {
    position: relative;
    border: 1px solid #da7756;
    border-radius: 8px;
    margin: 10px 0 12px;
    font-size: 13px;
    white-space: normal;
    max-width: 780px;
  }
  .welcome-box-title {
    position: absolute;
    top: -0.6em;
    left: 16px;
    background: #0c0c0c;
    padding: 0 6px;
    color: #da7756;
    line-height: 1;
  }
  .welcome-body {
    display: flex;
  }
  .welcome-left {
    flex: 0 0 48%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 10px 12px;
    gap: 1px;
  }
  .welcome-right {
    flex: 1;
    padding: 10px 14px;
    border-left: 1px solid #da7756;
  }
  .welcome-hello {
    color: #da7756;
    font-size: 14px;
    margin-bottom: 4px;
  }
  .welcome-logo {
    color: #da7756;
    line-height: 1.3;
  }
  .welcome-info {
    color: #777;
    font-size: 12px;
    margin-top: 2px;
  }
  .welcome-sep {
    border: none;
    border-top: 1px solid #444;
    margin: 8px 0;
  }

  /* 输入行 — 上下白色实线 */
  #input-line {
    display: flex;
    align-items: center;
    padding: 6px 0;
    border-top: 1px solid #cccccc;
    border-bottom: 1px solid #cccccc;
    margin-top: 8px;
  }
  #prompt {
    color: #8a2be2;
    font-weight: bold;
    margin-right: 6px;
    white-space: nowrap;
  }
  #cmd-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #cccccc;
    font-family: inherit;
    font-size: 14px;
    caret-color: #cccccc;
  }

  /* 终端风格表格 */
  .term-table {
    white-space: normal;
    margin: 6px 0 6px 8px;
    border-collapse: collapse;
  }
  .term-table td {
    padding: 3px 16px 3px 0;
    vertical-align: top;
  }
  .term-table .label {
    color: #dcdcaa;
    white-space: nowrap;
    min-width: 100px;
  }

  /* 项目卡片分隔 */
  .project-divider {
    color: #da7756;
    margin: 4px 0 6px 0;
  }

  /* 输出样式 */
  .cmd-echo { color: #888; }
  .cmd-echo .echo-prompt { color: #8a2be2; font-weight: bold; }
  .error { color: #f44747; }
  .success { color: #4ec9b0; }
  .section-title { color: #569cd6; font-weight: bold; }
  .highlight { color: #dcdcaa; }
  .dim { color: #777; }
  .tag { color: #4ec9b0; }
  .link { color: #9cdcfe; text-decoration: underline; }
  .link:hover { color: #cee4fe; }
  .separator { color: #444; }
  .output-block { margin-bottom: 8px; }
</style>

<body>

const cmdNames = Object.keys(commands);

// 标准化输入：去掉开头的 /，转小写
function normalizeCmd(raw) {
  let cmd = raw.toLowerCase().trim();
  if (cmd.startsWith('/')) cmd = cmd.slice(1);
  return cmd;
}

// ============================================================
// 渲染
// ============================================================
const terminal = document.getElementById('terminal');
const output   = document.getElementById('output');
const input    = document.getElementById('cmd-input');

function appendHTML(html) {
  const div = document.createElement('div');
  div.className = 'output-block';
  div.innerHTML = html;
  output.appendChild(div);
  scrollToBottom();
}

function scrollToBottom() {
  terminal.scrollTop = terminal.scrollHeight;
}

// 初始化欢迎卡片
(function init() {
  const div = document.createElement('div');
  div.id = 'welcome';
  div.className = 'output-block';
  div.innerHTML = WELCOME_HTML;
  output.appendChild(div);
})();

// 键盘事件
input.addEventListener('keydown', function(e) {
  // Tab 补全
  if (e.key === 'Tab') {
    e.preventDefault();
    handleTab();
    return;
  }
  if (e.key !== 'Enter') return;

  const raw = input.value.trim();
  input.value = '';
  if (!raw) return;

  // 回显用户输入
  const echoDiv = document.createElement('div');
  echoDiv.className = 'output-block cmd-echo';
  echoDiv.innerHTML = `<span class="echo-prompt">&gt;</span> ${escapeHtml(raw)}`;
  output.appendChild(echoDiv);

  const cmd = normalizeCmd(raw);

  // clear：保留欢迎卡片
  if (cmd === 'clear') {
    const welcome = document.getElementById('welcome');
    output.innerHTML = '';
    if (welcome) output.appendChild(welcome);
    scrollToBottom();
    return;
  }

  // 查找命令
  const fn = commands[cmd];
  if (fn) {
    const result = fn();
    if (result !== null) appendHTML(result);
  } else {
    appendHTML(`<span class="error">command not found: ${escapeHtml(raw)}</span>\n<span class="dim">输入 help 查看可用指令。</span>`);
  }
  scrollToBottom();
});

// Tab 补全
function handleTab() {
  let val = input.value.trim().toLowerCase();
  if (val.startsWith('/')) val = val.slice(1);
  if (!val) {
    appendHTML(`<span class="dim">${cmdNames.join('  ')}</span>`);
    return;
  }
  const matches = cmdNames.filter(c => c.startsWith(val));
  if (matches.length === 1) {
    input.value = matches[0];
  } else if (matches.length > 1) {
    appendHTML(`<span class="dim">${matches.join('  ')}</span>`);
  }
}

// 点击聚焦（不拦截链接点击）
document.addEventListener('click', (e) => {
  if (!e.target.closest('a')) input.focus();
});

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
